; Hearth sensor node — PlatformIO project
;
; Build & flash (reproducible, no host toolchain needed) via Docker:
;   docker run --rm --device=/dev/ttyUSB0 -v "$PWD":/w -w /w \
;     -v hearth-pio:/root/.platformio python:3.13-slim \
;     bash -lc 'pip install -q platformio && pio run -t upload'
;
; Or natively if you have PlatformIO installed:
;   pio run -t upload && pio device monitor

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
; 460800 is a safe rate for the common CH340 USB-serial boards.
upload_speed = 460800
lib_deps =
    adafruit/DHT sensor library@^1.4.6
    adafruit/Adafruit Unified Sensor@^1.1.14
build_flags =
    -DHEARTH_FW_VERSION=\"0.1.0\"

; ─── Motor node ────────────────────────────────────────────────────────────
; The SAME firmware, flashed onto a second ESP32 with a relay wired to GPIO26.
; It self-describes a "motor" actuator the cloud can command on/off — the
; opposite direction of the sensor nodes. No source edits: the build flags below
; enable the relay path (config.h guards every relay define with #ifndef).
;   pio run -e esp32-motor -t upload
[env:esp32-motor]
extends = env:esp32dev
build_flags =
    -DHEARTH_FW_VERSION=\"0.1.0\"
    -DRELAY_PIN=26          ; GPIO driving the relay (through a transistor for a bare coil)
    -DRELAY_ACTIVE_HIGH=1   ; GPIO HIGH energizes (NPN low-side switch); flip to 0 for blue modules
    -DRELAY_MAX_ON_MS=0     ; no auto-off — runs until commanded off
    -DDHT_PIN=-1            ; motor node has no DHT; still reports built-in chip temp
