# Serverless Devs manifest — deploys the Hearth cloud backend to Alibaba
# Function Compute 3.0 as a custom-runtime web server (FC forwards HTTP to :9000).
#
# Prereqs (see backend/README.md):
#   - Alibaba Cloud account + AccessKey with FC access
#   - `npm i -g @serverless-devs/s` and `s config add` (or env AccessKey)
#   - `npm run build`  (produces ./dist/server.js)
#
# Serverless Devs errors on ANY unresolved ${env.X}, so this file references only
# the vars a deploy truly needs — QWEN_API_KEY and AUTH_SESSION_SECRET (the server
# refuses to boot without the latter). Everything else has a safe default in the
# server code (QWEN_BASE_URL→intl, HEARTH_STORE→memory); add those envs here only
# once you actually wire Tablestore / Telegram.
#
# AUTH_SESSION_SECRET must be the SAME value as backend/.env (gitignored). Easiest:
#   set -a; . ./.env; set +a; QWEN_API_KEY=... s deploy
# so the secret is sourced from .env and never lands in this committed file.
#
# Deploy:  set -a; . ./.env; set +a; QWEN_API_KEY=... s deploy
edition: 3.0.0
name: hearth-cloud
access: default

vars:
  # Hardcoded (not ${env('FC_REGION')}): FC_REGION is a RESERVED var that Function
  # Compute injects at runtime, and the fc3 uploader treats "process.env.FC_REGION
  # === region" as "I'm running inside FC" → switches code upload to the VPC-only
  # oss-*-internal endpoint, which times out from a laptop. Setting FC_REGION to
  # satisfy this file is exactly what broke `s deploy`. Keep it out of the env.
  region: ap-southeast-1

resources:
  hearth-mcp:
    component: fc3
    props:
      region: ${vars.region}
      functionName: hearth-mcp
      description: Hearth Home MCP server + Qwen orchestration
      runtime: custom.debian10
      code: ./dist
      cpu: 0.35
      memorySize: 512
      diskSize: 512
      timeout: 60
      instanceConcurrency: 10
      customRuntimeConfig:
        # custom.debian10 ships node but NOT on $PATH — reference it by absolute path.
        # command = executable only; the script goes in args (separate keys).
        command:
          - /var/fc/lang/nodejs20/bin/node
        args:
          - server.cjs
        port: 9000
      environmentVariables:
        # Qwen (Model Studio / DashScope) — the brain. QWEN_BASE_URL defaults to the
        # International endpoint in code; override it here only for a US-region account.
        QWEN_API_KEY: ${env('QWEN_API_KEY')}
        QWEN_MODEL: qwen-plus
        # HMAC secret for session tokens — REQUIRED (no fallback). Sourced from the
        # deploy env; keep it identical to backend/.env. See the deploy note above.
        AUTH_SESSION_SECRET: ${env('AUTH_SESSION_SECRET')}
        # Durable store — authored watches persist across FC instances/cold-starts
        # (Tablestore instance `hearth-mvp`, region-colocated). All four sourced from
        # the deploy env; `s` errors on any unresolved ${env('...')}, so they must be
        # present when you run `s deploy` (root .env has the ALI keys).
        HEARTH_STORE: tablestore
        TABLESTORE_ENDPOINT: ${env('TABLESTORE_ENDPOINT')}
        TABLESTORE_INSTANCE: ${env('TABLESTORE_INSTANCE')}
        ALI_ACCESS_KEY_ID: ${env('ALI_ACCESS_KEY_ID')}
        ALI_ACCESS_KEY_SECRET: ${env('ALI_ACCESS_KEY_SECRET')}
        # Add once wired: TELEGRAM_BOT_TOKEN / TELEGRAM_CHAT_ID
      triggers:
        - triggerName: http
          triggerType: http
          triggerConfig:
            authType: anonymous
            methods:
              - GET
              - POST
